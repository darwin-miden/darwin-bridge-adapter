[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
test = "contracts/test"

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
number_underscore = "preserve"

[rpc_endpoints]
# Add when needed; e.g. anvil = "http://127.0.0.1:8545"
